<!DOCTYPE html>
<html>
<head>
<title>Student Exam Performance Indicator</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background-color:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    width:650px;   /* increased width */
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    font-size:28px;
}

h2{
    text-align:center;
    font-size:20px;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

select,input{
    width:100%;
    padding:8px;
    margin-top:5px;
}

button{
    width:100%;
    margin-top:20px;
    padding:10px;
    background-color:#444;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background-color:black;
}

.result{
    margin-top:25px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Student Exam Performance Indicator</h1>
<h2>Student Exam Performance Prediction</h2>

<form action="{{url_for('predict')}}" method="post">

<label>Gender</label>
<select name="gender">
<option value="">Select your Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Race or Ethnicity</label>
<select name="race_ethnicity">
<option value="">Select Ethnicity</option>
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>

<label>Parental Level of Education</label>
<select name="parental_level_of_education">
<option value="">Select Parent Education</option>
<option value="some high school">Some High School</option>
<option value="high school">High School</option>
<option value="some college">Some College</option>
<option value="associate's degree">Associate Degree</option>
<option value="bachelor's degree">Bachelor Degree</option>
<option value="master's degree">Master Degree</option>
</select>

<label>Lunch Type</label>
<select name="lunch">
<option value="">Select Lunch Type</option>
<option value="standard">Standard</option>
<option value="free/reduced">Free/Reduced</option>
</select>

<label>Test Preparation Course</label>
<select name="test_preparation_course">
<option value="">Select Test Course</option>
<option value="none">None</option>
<option value="completed">Completed</option>
</select>

<label>Writing Score out of 100</label>
<input type="number" name="writing_score" min="0" max="100" placeholder="Enter writing score" required>

<label>Reading Score out of 100</label>
<input type="number" name="reading_score" min="0" max="100" placeholder="Enter reading score" required>

<button type="submit">Predict Maths Score</button>

</form>

<div class="result">
THE prediction is {{results}} 
</div>

</div>

</body>
</html>
